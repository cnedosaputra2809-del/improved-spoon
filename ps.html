    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background-color: #ffffff; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 450px; padding: 20px; height: 100%; position: relative; display: flex; flex-direction: column; }
        
        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .back-btn { font-size: 24px; cursor: pointer; color: #000; }
        .title { font-size: 17px; font-weight: 700; }

        /* Tabs Tahap 1 */
        .tabs { display: flex; border-bottom: 1px solid #ebebeb; margin-bottom: 25px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 15px; color: #8a8a8a; cursor: pointer; position: relative; }
        .tab.active { color: #000; font-weight: 600; }
        .tab.active::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background-color: #000; }

        /* Input Box */
        .input-box { display: flex; align-items: center; background-color: #f1f1f2; border-radius: 4px; padding: 0 12px; height: 44px; margin-bottom: 15px; border: 1px solid transparent; }
        .country-code { font-weight: 600; padding-right: 12px; border-right: 1px solid #d1d1d3; margin-right: 12px; font-size: 15px; }
        input { background: transparent; border: none; outline: none; font-size: 15px; width: 100%; color: #161823; caret-color: #fe2c55; }



        /* Tombol Lanjutkan */
        .btn-submit { 
            width: calc(100% - 40px); background-color: #fe2c55; color: white; border: none; 
            border-radius: 8px; padding: 14px; font-size: 16px; font-weight: 600; 
            position: absolute; bottom: 49vh; left: 20px; cursor: not-allowed; 
            display: flex; justify-content: center; align-items: center;
        }
        .btn-active { background-color: #fe2c55; cursor: pointer; }

        /* Loading Spinner */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ffffff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

<script>
